name = "granny-walks"
main = "worker.js"
compatibility_date = "2026-01-01"

[vars]
# Granny's "anyone with link" share URL (redeemed via Graph by the signed-in
# account — no need for that account to be Granny's).
SHARE_URL = "https://1drv.ms/x/c/1f677a749499d8fa/IQBtz3JP3HvlTZRgdgQnyHfFAdUHalPFEZxDfoU37ZPznNQ"
# Restrict CORS to the site origin (use "*" to allow anywhere).
ALLOW_ORIGIN = "https://moscovium0894.github.io"

# Recommended: persist the rotating refresh token so it never goes stale.
# Create with: wrangler kv namespace create TOKENS  →  paste the id below.
# [[kv_namespaces]]
# binding = "TOKENS"
# id = "<your-kv-namespace-id>"

# Secrets (do NOT put here — set with `wrangler secret put`):
#   MS_CLIENT_ID
#   MS_REFRESH_TOKEN
